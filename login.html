<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVault — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080b10;--bg2:#0e1219;--surface:#131820;--surface2:#1a2030;
    --border:#1e2a3a;--border2:#253040;
    --green:#00ff87;--purple:#a855f7;--blue:#38bdf8;--red:#f87171;
    --text:#e2e8f0;--muted:#475569;--muted2:#64748b;
    --sans:'Outfit',sans-serif;--mono:'Fira Code',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .bg-mesh{position:fixed;inset:0;z-index:0;background:
    radial-gradient(ellipse 80% 60% at 20% 10%,rgba(0,255,135,.06) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%,rgba(168,85,247,.08) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 50% 50%,rgba(56,189,248,.03) 0%,transparent 70%)}
  .bg-grid{position:fixed;inset:0;z-index:0;
    background-image:linear-gradient(rgba(0,255,135,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,135,.025) 1px,transparent 1px);background-size:60px 60px}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;
    animation:drift 12s ease-in-out infinite}
  .orb-1{width:350px;height:350px;background:rgba(0,255,135,.07);top:-100px;left:-100px}
  .orb-2{width:280px;height:280px;background:rgba(168,85,247,.09);bottom:-80px;right:-80px;animation-delay:-5s}
  .orb-3{width:200px;height:200px;background:rgba(56,189,248,.05);top:40%;right:5%;animation-delay:-9s}
  @keyframes drift{0%,100%{transform:translate(0,0)}40%{transform:translate(12px,-18px)}70%{transform:translate(-8px,12px)}}
  .container{position:relative;z-index:1;width:100%;max-width:440px;padding:24px;
    animation:rise .6s cubic-bezier(.16,1,.3,1)}
  @keyframes rise{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .logo{display:flex;align-items:center;gap:14px;margin-bottom:36px;justify-content:center}
  .logo-mark{width:48px;height:48px;display:flex;align-items:center;justify-content:center}
  .logo-mark svg{width:48px;height:48px;filter:drop-shadow(0 0 12px rgba(0,255,135,.5));
    animation:lpulse 3s ease-in-out infinite}
  @keyframes lpulse{0%,100%{filter:drop-shadow(0 0 8px rgba(0,255,135,.4))}
    50%{filter:drop-shadow(0 0 22px rgba(0,255,135,.7))}}
  .logo-name{font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1}
  .logo-name em{font-style:normal;background:linear-gradient(135deg,var(--green),var(--blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .logo-tag{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:2px;margin-top:2px}
  .card{background:rgba(19,24,32,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid var(--border2);border-radius:24px;padding:40px 36px;position:relative;overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,255,135,.04),0 24px 56px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04)}
  .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,255,135,.4),rgba(168,85,247,.4),transparent)}
  .card-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:6px}
  .card-sub{font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:1px;
    display:flex;align-items:center;gap:8px;margin-bottom:28px}
  .card-sub::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:blink 2s infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .error-msg{display:none;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);
    border-radius:12px;padding:12px 16px;font-family:var(--mono);font-size:12px;color:var(--red);
    margin-bottom:20px;gap:8px}
  .error-msg.visible{display:flex;align-items:center}
  .error-msg.visible::before{content:"⚠";font-size:14px;flex-shrink:0}
  .field{margin-bottom:20px}
  .field-label{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:2px;
    text-transform:uppercase;margin-bottom:8px;display:block}
  .field-wrap{position:relative}
  .field-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:15px;
    pointer-events:none;opacity:.5;color:var(--green)}
  .field-input{width:100%;background:rgba(8,11,16,.9);border:1px solid var(--border2);
    border-radius:12px;padding:14px 16px 14px 46px;font-family:var(--sans);font-size:15px;
    font-weight:500;color:var(--text);outline:none;transition:all .2s;-webkit-appearance:none}
  .field-input:focus{border-color:var(--green);
    box-shadow:0 0 0 3px rgba(0,255,135,.07),0 0 24px rgba(0,255,135,.04)}
  .field-input::placeholder{color:var(--muted)}
  .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;
    padding:4px;transition:color .15s}
  .toggle-pw:hover{color:var(--text)}
  .new-pw-panel{display:none;background:rgba(0,255,135,.03);border:1px solid rgba(0,255,135,.12);
    border-radius:14px;padding:20px;margin-bottom:20px}
  .new-pw-panel.visible{display:block;animation:rise .3s ease}
  .new-pw-note{font-family:var(--mono);font-size:11px;color:var(--green);margin-bottom:16px;opacity:.85}
  .new-pw-panel .field{margin-bottom:14px}
  .new-pw-panel .field:last-child{margin-bottom:0}
  .btn-submit{width:100%;padding:15px;
    background:linear-gradient(135deg,rgba(0,255,135,.12),rgba(168,85,247,.12));
    border:1px solid rgba(0,255,135,.25);border-radius:14px;font-family:var(--sans);
    font-size:15px;font-weight:700;color:var(--green);cursor:pointer;transition:all .25s;
    margin-top:8px;letter-spacing:.5px;position:relative;overflow:hidden}
  .btn-submit:hover:not(:disabled){border-color:rgba(0,255,135,.5);
    box-shadow:0 0 28px rgba(0,255,135,.12),0 8px 24px rgba(0,0,0,.4);transform:translateY(-1px)}
  .btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,255,135,.2);
    border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite;
    vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .card-footer{margin-top:28px;text-align:center;font-family:var(--mono);font-size:10px;
    color:var(--muted);letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:8px}
  .footer-sep{opacity:.3}
  @media(max-width:480px){.container{padding:16px}.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="container">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="24,2 46,13 46,35 24,46 2,35 2,13" fill="none" stroke="url(#g1)" stroke-width="1.5"/>
        <polygon points="24,9 39,17 39,31 24,39 9,31 9,17" fill="rgba(0,255,135,0.05)" stroke="url(#g2)" stroke-width="1"/>
        <circle cx="24" cy="24" r="5.5" fill="url(#g3)"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48">
            <stop offset="0%" stop-color="#00ff87"/><stop offset="100%" stop-color="#a855f7"/>
          </linearGradient>
          <linearGradient id="g2" x1="0" y1="0" x2="48" y2="48">
            <stop offset="0%" stop-color="#00ff87" stop-opacity=".5"/><stop offset="100%" stop-color="#a855f7" stop-opacity=".5"/>
          </linearGradient>
          <radialGradient id="g3"><stop offset="0%" stop-color="#00ff87"/><stop offset="100%" stop-color="#38bdf8"/></radialGradient>
        </defs>
      </svg>
    </div>
    <div>
      <div class="logo-name">Data<em>Vault</em></div>
      <div class="logo-tag">SECURE STORAGE</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Acceso seguro</div>
    <div class="card-sub">AUTENTICACIÓN · AWS COGNITO</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="field">
      <label class="field-label" for="username">Usuario</label>
      <div class="field-wrap">
        <span class="field-icon">▸</span>
        <input class="field-input" id="username" type="text" placeholder="tu usuario" autocomplete="username" autocapitalize="none"/>
      </div>
    </div>
    <div class="field">
      <label class="field-label" for="password">Contraseña</label>
      <div class="field-wrap">
        <span class="field-icon">●</span>
        <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw('password', this)">👁</button>
      </div>
    </div>
    <div class="new-pw-panel" id="newPwPanel">
      <div class="new-pw-note">▸ Primer acceso — establece tu contraseña definitiva</div>
      <div class="field">
        <label class="field-label" for="newPassword">Nueva contraseña</label>
        <div class="field-wrap">
          <span class="field-icon">▸</span>
          <input class="field-input" id="newPassword" type="password" placeholder="Mínimo 8 caracteres"/>
          <button class="toggle-pw" type="button" onclick="togglePw('newPassword', this)">👁</button>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="confirmPassword">Confirmar contraseña</label>
        <div class="field-wrap">
          <span class="field-icon">▸</span>
          <input class="field-input" id="confirmPassword" type="password" placeholder="Repite la contraseña"/>
        </div>
      </div>
    </div>
    <button class="btn-submit" id="btnLogin" onclick="handleLogin()">Ingresar →</button>
    <div class="card-footer">
      <span>CIFRADO TLS</span><span class="footer-sep">·</span>
      <span>AWS COGNITO</span><span class="footer-sep">·</span>
      <span>SA-EAST-1</span>
    </div>
  </div>
</div>
<script>

// ─────────────────────────────────────────────────────────────────────────────
//  CONFIGURACIÓN COGNITO
//  Reemplaza estos valores con los de tu User Pool en AWS Cognito:
//    USER_POOL_ID → Cognito → User Pools → tu pool → "Pool ID"
//    CLIENT_ID   → App integration → App clients → tu client → "Client ID"
// ─────────────────────────────────────────────────────────────────────────────
const COGNITO_REGION  = 'sa-east-1';
const USER_POOL_ID    = 'sa-east-1_BqlxHuf3a';
const CLIENT_ID       = '5q98frfqc7u7s5vfv1pfpo9u7c';

const COGNITO_URL = `https://cognito-idp.${COGNITO_REGION}.amazonaws.com/`;

// Página a la que redirige tras login exitoso
const REDIRECT_AFTER_LOGIN = 'index.html';

// ─────────────────────────────────────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────────────────────────────────────
let challengeSession = null;   // sesión activa para NEW_PASSWORD_REQUIRED
let challengeUser    = null;   // username para el challenge

// ─────────────────────────────────────────────────────────────────────────────
//  VERIFICAR SI YA HAY SESIÓN ACTIVA
//  Si el token existe y no expiró, redirige directo sin mostrar login
// ─────────────────────────────────────────────────────────────────────────────
(function checkSession() {
  const token   = localStorage.getItem('dv_access_token');
  const expires = parseInt(localStorage.getItem('dv_token_expires') || '0');
  if (token && Date.now() < expires) {
    window.location.replace(REDIRECT_AFTER_LOGIN);
  }
})();

// ─────────────────────────────────────────────────────────────────────────────
//  HANDLER PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────────
async function handleLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    showError('Completa usuario y contraseña.');
    return;
  }

  // Si hay challenge activo → procesar nueva contraseña
  if (challengeSession) {
    await handleNewPassword();
    return;
  }

  setLoading(true);
  hideError();

  try {
    const res = await cognitoRequest('InitiateAuth', {
      AuthFlow:       'USER_PASSWORD_AUTH',
      ClientId:       CLIENT_ID,
      AuthParameters: { USERNAME: username, PASSWORD: password }
    });

    if (res.ChallengeName === 'NEW_PASSWORD_REQUIRED') {
      // Primer login — pedir nueva contraseña
      challengeSession = res.Session;
      challengeUser    = username;
      document.getElementById('newPwPanel').classList.add('visible');
      document.getElementById('btnLogin').textContent = 'Confirmar nueva contraseña →';
      setLoading(false);
      return;
    }

    if (res.AuthenticationResult) {
      saveSession(res.AuthenticationResult);
      window.location.replace(REDIRECT_AFTER_LOGIN);
    } else {
      showError('Respuesta inesperada de Cognito.');
    }

  } catch (err) {
    showError(friendlyError(err.message || err));
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  CHALLENGE: NUEVA CONTRASEÑA (primer login)
// ─────────────────────────────────────────────────────────────────────────────
async function handleNewPassword() {
  const newPw     = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;

  if (!newPw || newPw.length < 8) {
    showError('La contraseña debe tener mínimo 8 caracteres.');
    return;
  }

  if (newPw !== confirmPw) {
    showError('Las contraseñas no coinciden.');
    return;
  }

  setLoading(true);
  hideError();

  try {
    const res = await cognitoRequest('RespondToAuthChallenge', {
      ChallengeName:      'NEW_PASSWORD_REQUIRED',
      ClientId:           CLIENT_ID,
      Session:            challengeSession,
      ChallengeResponses: {
        USERNAME:     challengeUser,
        NEW_PASSWORD: newPw
      }
    });

    if (res.AuthenticationResult) {
      saveSession(res.AuthenticationResult);
      window.location.replace(REDIRECT_AFTER_LOGIN);
    } else {
      showError('No se pudo completar el cambio de contraseña.');
    }

  } catch (err) {
    showError(friendlyError(err.message || err));
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GUARDAR SESIÓN EN localStorage
// ─────────────────────────────────────────────────────────────────────────────
function saveSession(auth) {
  const expiresAt = Date.now() + (auth.ExpiresIn * 1000);   // ExpiresIn viene en segundos
  localStorage.setItem('dv_access_token',  auth.AccessToken);
  localStorage.setItem('dv_id_token',      auth.IdToken);
  localStorage.setItem('dv_refresh_token', auth.RefreshToken);
  localStorage.setItem('dv_token_expires', expiresAt.toString());
}

// ─────────────────────────────────────────────────────────────────────────────
//  LLAMADA A LA API DE COGNITO
//  Cognito expone una API REST directa — no necesita SDK
// ─────────────────────────────────────────────────────────────────────────────
async function cognitoRequest(action, body) {
  const res = await fetch(COGNITO_URL, {
    method:  'POST',
    headers: {
      'Content-Type': 'application/x-amz-json-1.1',
      'X-Amz-Target': `AWSCognitoIdentityProviderService.${action}`
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.message || data.__type || 'Error desconocido');
  }

  return data;
}

// ─────────────────────────────────────────────────────────────────────────────
//  HELPERS UI
// ─────────────────────────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('btnLogin');
  btn.disabled = on;
  if (on) {
    btn.innerHTML = '<span class="spinner"></span>Verificando...';
  } else {
    btn.textContent = challengeSession ? 'Confirmar nueva contraseña →' : 'Ingresar →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function togglePw(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function friendlyError(msg) {
  if (msg.includes('NotAuthorizedException'))   return 'Usuario o contraseña incorrectos.';
  if (msg.includes('UserNotFoundException'))    return 'Usuario no encontrado.';
  if (msg.includes('UserNotConfirmedException'))return 'Usuario no confirmado en Cognito.';
  if (msg.includes('PasswordResetRequired'))   return 'Debes restablecer tu contraseña.';
  if (msg.includes('TooManyRequestsException'))return 'Demasiados intentos. Espera un momento.';
  if (msg.includes('NetworkError') || msg.includes('fetch')) return 'Error de red. Verifica tu conexión.';
  return msg;
}

// Enter para enviar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

</script>
</body>
</html>
