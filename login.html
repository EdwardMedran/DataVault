<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVault — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #07080d;
    --bg2:     #0d0f17;
    --surface: #12141f;
    --border:  #252840;
    --accent:  #00e5ff;
    --accent2: #7c3aed;
    --green:   #00e676;
    --red:     #ff1744;
    --text:    #dde1f0;
    --muted:   #5a5f7a;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'Space Grotesk', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    bottom: -150px;
    left: -100px;
    pointer-events: none;
    z-index: 0;
  }

  .glow-top {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 24px;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 40px;
    justify-content: center;
  }

  .logo-hex {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    animation: pulse-hex 3s ease infinite;
  }

  @keyframes pulse-hex {
    0%,100% { filter: brightness(1); }
    50%      { filter: brightness(1.3) drop-shadow(0 0 8px rgba(0,229,255,0.5)); }
  }

  .logo-name {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-name span { color: var(--accent); }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .card-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }

  .card-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.5px;
  }

  /* Form */
  .field {
    margin-bottom: 18px;
  }

  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .field-wrap {
    position: relative;
  }

  .field-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    pointer-events: none;
  }

  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 12px 42px;
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }

  .field-input::placeholder { color: var(--muted); }

  /* Toggle password */
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    transition: color 0.15s;
  }

  .toggle-pw:hover { color: var(--text); }

  /* New password panel */
  .new-pw-panel {
    display: none;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.15);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 18px;
  }

  .new-pw-panel.visible { display: block; animation: fadeIn 0.3s ease; }

  .new-pw-panel .field { margin-bottom: 14px; }
  .new-pw-panel .field:last-child { margin-bottom: 0; }

  .new-pw-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  /* Submit btn */
  .btn-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    letter-spacing: 0.3px;
    position: relative;
    overflow: hidden;
  }

  .btn-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(0,229,255,0.25);
  }

  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error msg */
  .error-msg {
    display: none;
    background: rgba(255,23,68,0.08);
    border: 1px solid rgba(255,23,68,0.25);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 18px;
    animation: fadeIn 0.2s ease;
  }

  .error-msg.visible { display: block; }

  /* Footer */
  .card-footer {
    margin-top: 24px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .status-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  @media (max-width: 480px) {
    .container { padding: 16px; }
    .card { padding: 28px 20px; }
    .card-title { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="glow-top"></div>
<div class="scanlines"></div>

<div class="container">

  <div class="logo">
    <div class="logo-hex">⬡</div>
    <div class="logo-name">Data<span>Vault</span></div>
  </div>

  <div class="card">
    <div class="card-title">Acceso seguro</div>
    <div class="card-sub">AUTENTICACIÓN REQUERIDA · AWS COGNITO</div>

    <div class="error-msg" id="errorMsg"></div>

    <!-- Campo usuario -->
    <div class="field">
      <label class="field-label" for="username">Usuario</label>
      <div class="field-wrap">
        <span class="field-icon">👤</span>
        <input
          class="field-input"
          id="username"
          type="text"
          placeholder="tu usuario"
          autocomplete="username"
          autocapitalize="none"
        />
      </div>
    </div>

    <!-- Campo contraseña -->
    <div class="field">
      <label class="field-label" for="password">Contraseña</label>
      <div class="field-wrap">
        <span class="field-icon">🔒</span>
        <input
          class="field-input"
          id="password"
          type="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button class="toggle-pw" type="button" onclick="togglePw('password', this)">👁</button>
      </div>
    </div>

    <!-- Panel nueva contraseña (primer login) -->
    <div class="new-pw-panel" id="newPwPanel">
      <div class="new-pw-note">⚠ Es tu primer acceso — debes establecer una contraseña nueva.</div>
      <div class="field">
        <label class="field-label" for="newPassword">Nueva contraseña</label>
        <div class="field-wrap">
          <span class="field-icon">🔑</span>
          <input class="field-input" id="newPassword" type="password" placeholder="Mínimo 8 caracteres" />
          <button class="toggle-pw" type="button" onclick="togglePw('newPassword', this)">👁</button>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="confirmPassword">Confirmar contraseña</label>
        <div class="field-wrap">
          <span class="field-icon">🔑</span>
          <input class="field-input" id="confirmPassword" type="password" placeholder="Repite la contraseña" />
        </div>
      </div>
    </div>

    <button class="btn-submit" id="btnLogin" onclick="handleLogin()">
      Ingresar →
    </button>

    <div class="card-footer">
      <span class="status-dot"></span>
      Conexión cifrada · AWS Cognito
    </div>
  </div>

</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIGURACIÓN COGNITO
//  Reemplaza estos valores con los de tu User Pool en AWS Cognito:
//    USER_POOL_ID → Cognito → User Pools → tu pool → "Pool ID"
//    CLIENT_ID   → App integration → App clients → tu client → "Client ID"
// ─────────────────────────────────────────────────────────────────────────────
const COGNITO_REGION  = 'sa-east-1';
const USER_POOL_ID    = 'sa-east-1_BqlxHuf3a';
const CLIENT_ID       = '5q98frfqc7u7s5vfv1pfpo9u7c';

const COGNITO_URL = `https://cognito-idp.${COGNITO_REGION}.amazonaws.com/`;

// Página a la que redirige tras login exitoso
const REDIRECT_AFTER_LOGIN = 'index.html';

// ─────────────────────────────────────────────────────────────────────────────
//  ESTADO
// ─────────────────────────────────────────────────────────────────────────────
let challengeSession = null;   // sesión activa para NEW_PASSWORD_REQUIRED
let challengeUser    = null;   // username para el challenge

// ─────────────────────────────────────────────────────────────────────────────
//  VERIFICAR SI YA HAY SESIÓN ACTIVA
//  Si el token existe y no expiró, redirige directo sin mostrar login
// ─────────────────────────────────────────────────────────────────────────────
(function checkSession() {
  const token   = localStorage.getItem('dv_access_token');
  const expires = parseInt(localStorage.getItem('dv_token_expires') || '0');
  if (token && Date.now() < expires) {
    window.location.replace(REDIRECT_AFTER_LOGIN);
  }
})();

// ─────────────────────────────────────────────────────────────────────────────
//  HANDLER PRINCIPAL
// ─────────────────────────────────────────────────────────────────────────────
async function handleLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    showError('Completa usuario y contraseña.');
    return;
  }

  // Si hay challenge activo → procesar nueva contraseña
  if (challengeSession) {
    await handleNewPassword();
    return;
  }

  setLoading(true);
  hideError();

  try {
    const res = await cognitoRequest('InitiateAuth', {
      AuthFlow:       'USER_PASSWORD_AUTH',
      ClientId:       CLIENT_ID,
      AuthParameters: { USERNAME: username, PASSWORD: password }
    });

    if (res.ChallengeName === 'NEW_PASSWORD_REQUIRED') {
      // Primer login — pedir nueva contraseña
      challengeSession = res.Session;
      challengeUser    = username;
      document.getElementById('newPwPanel').classList.add('visible');
      document.getElementById('btnLogin').textContent = 'Confirmar nueva contraseña →';
      setLoading(false);
      return;
    }

    if (res.AuthenticationResult) {
      saveSession(res.AuthenticationResult);
      window.location.replace(REDIRECT_AFTER_LOGIN);
    } else {
      showError('Respuesta inesperada de Cognito.');
    }

  } catch (err) {
    showError(friendlyError(err.message || err));
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  CHALLENGE: NUEVA CONTRASEÑA (primer login)
// ─────────────────────────────────────────────────────────────────────────────
async function handleNewPassword() {
  const newPw     = document.getElementById('newPassword').value;
  const confirmPw = document.getElementById('confirmPassword').value;

  if (!newPw || newPw.length < 8) {
    showError('La contraseña debe tener mínimo 8 caracteres.');
    return;
  }

  if (newPw !== confirmPw) {
    showError('Las contraseñas no coinciden.');
    return;
  }

  setLoading(true);
  hideError();

  try {
    const res = await cognitoRequest('RespondToAuthChallenge', {
      ChallengeName:      'NEW_PASSWORD_REQUIRED',
      ClientId:           CLIENT_ID,
      Session:            challengeSession,
      ChallengeResponses: {
        USERNAME:     challengeUser,
        NEW_PASSWORD: newPw
      }
    });

    if (res.AuthenticationResult) {
      saveSession(res.AuthenticationResult);
      window.location.replace(REDIRECT_AFTER_LOGIN);
    } else {
      showError('No se pudo completar el cambio de contraseña.');
    }

  } catch (err) {
    showError(friendlyError(err.message || err));
  } finally {
    setLoading(false);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  GUARDAR SESIÓN EN localStorage
// ─────────────────────────────────────────────────────────────────────────────
function saveSession(auth) {
  const expiresAt = Date.now() + (auth.ExpiresIn * 1000);   // ExpiresIn viene en segundos
  localStorage.setItem('dv_access_token',  auth.AccessToken);
  localStorage.setItem('dv_id_token',      auth.IdToken);
  localStorage.setItem('dv_refresh_token', auth.RefreshToken);
  localStorage.setItem('dv_token_expires', expiresAt.toString());
}

// ─────────────────────────────────────────────────────────────────────────────
//  LLAMADA A LA API DE COGNITO
//  Cognito expone una API REST directa — no necesita SDK
// ─────────────────────────────────────────────────────────────────────────────
async function cognitoRequest(action, body) {
  const res = await fetch(COGNITO_URL, {
    method:  'POST',
    headers: {
      'Content-Type': 'application/x-amz-json-1.1',
      'X-Amz-Target': `AWSCognitoIdentityProviderService.${action}`
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.message || data.__type || 'Error desconocido');
  }

  return data;
}

// ─────────────────────────────────────────────────────────────────────────────
//  HELPERS UI
// ─────────────────────────────────────────────────────────────────────────────
function setLoading(on) {
  const btn = document.getElementById('btnLogin');
  btn.disabled = on;
  if (on) {
    btn.innerHTML = '<span class="spinner"></span>Verificando...';
  } else {
    btn.textContent = challengeSession ? 'Confirmar nueva contraseña →' : 'Ingresar →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('errorMsg').classList.remove('visible');
}

function togglePw(fieldId, btn) {
  const input = document.getElementById(fieldId);
  const show  = input.type === 'password';
  input.type  = show ? 'text' : 'password';
  btn.textContent = show ? '🙈' : '👁';
}

function friendlyError(msg) {
  if (msg.includes('NotAuthorizedException'))   return 'Usuario o contraseña incorrectos.';
  if (msg.includes('UserNotFoundException'))    return 'Usuario no encontrado.';
  if (msg.includes('UserNotConfirmedException'))return 'Usuario no confirmado en Cognito.';
  if (msg.includes('PasswordResetRequired'))   return 'Debes restablecer tu contraseña.';
  if (msg.includes('TooManyRequestsException'))return 'Demasiados intentos. Espera un momento.';
  if (msg.includes('NetworkError') || msg.includes('fetch')) return 'Error de red. Verifica tu conexión.';
  return msg;
}

// Enter para enviar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
