<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataVault — Upload Center</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body{visibility:hidden}
</style>
<script>

(function() {
  const token   = localStorage.getItem('dv_access_token');
  const expires = parseInt(localStorage.getItem('dv_token_expires') || '0');
  if (!token || Date.now() >= expires) {
    window.location.replace('login.html');
  } else {
    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.visibility = 'visible';
    });
  }
})();

</script>
<style>
  :root {
    --bg:#080b10;--bg2:#0e1219;--surface:#131820;--surface2:#1a2030;
    --border:#1e2a3a;--border2:#253040;
    --green:#00ff87;--purple:#a855f7;--blue:#38bdf8;--red:#f87171;--amber:#fbbf24;
    --text:#e2e8f0;--muted:#475569;--muted2:#64748b;
    --sans:'Outfit',sans-serif;--mono:'Fira Code',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
  .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 70% 50% at 15% 0%,rgba(0,255,135,.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 70% at 85% 100%,rgba(168,85,247,.07) 0%,transparent 55%)}
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(0,255,135,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,135,.02) 1px,transparent 1px);background-size:56px 56px}
  .wrapper{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:40px 24px 80px}

  /* Header */
  header{display:flex;align-items:center;gap:16px;margin-bottom:48px;flex-wrap:wrap}
  .logo-mark{width:42px;height:42px;flex-shrink:0}
  .logo-mark svg{width:42px;height:42px;filter:drop-shadow(0 0 10px rgba(0,255,135,.4))}
  .logo-name{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .logo-name em{font-style:normal;background:linear-gradient(135deg,var(--green),var(--blue));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .header-badge{font-family:var(--mono);font-size:10px;color:var(--muted2);
    border:1px solid var(--border2);padding:5px 12px;border-radius:20px;letter-spacing:1px;white-space:nowrap}
  .btn-explorer,.btn-logout{display:flex;align-items:center;gap:7px;padding:8px 16px;
    border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:600;
    cursor:pointer;text-decoration:none;letter-spacing:.5px;transition:all .2s;white-space:nowrap}
  .btn-explorer{background:transparent;border:1px solid rgba(0,255,135,.3);color:var(--green)}
  .btn-explorer:hover{background:rgba(0,255,135,.06);border-color:rgba(0,255,135,.6);
    box-shadow:0 0 16px rgba(0,255,135,.1)}
  .btn-logout{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
  .btn-logout:hover{border-color:var(--red);color:var(--red)}

  /* Tabs */
  .tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(19,24,32,.8);
    border:1px solid var(--border2);border-radius:14px;padding:6px;backdrop-filter:blur(10px)}
  .tab-btn{flex:1;padding:11px 20px;background:transparent;border:none;border-radius:10px;
    font-family:var(--sans);font-size:14px;font-weight:600;color:var(--muted2);cursor:pointer;transition:all .2s}
  .tab-btn.active{background:rgba(0,255,135,.08);color:var(--green);
    box-shadow:0 0 0 1px rgba(0,255,135,.2),inset 0 1px 0 rgba(0,255,135,.1)}
  .tab-btn:hover:not(.active){color:var(--text)}
  .panel{display:none;animation:fadeUp .3s ease}
  .panel.active{display:block}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Card */
  .card{background:rgba(19,24,32,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--border2);border-radius:20px;padding:28px;position:relative;overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,255,135,.03),0 16px 40px rgba(0,0,0,.4)}
  .card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,255,135,.3),rgba(168,85,247,.3),transparent)}
  .card-title{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted2);
    text-transform:uppercase;letter-spacing:2px;margin-bottom:20px;
    display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';width:6px;height:6px;border-radius:50%;
    background:var(--green);box-shadow:0 0 6px var(--green)}

  /* Inputs */
  .title-input{width:100%;background:rgba(8,11,16,.9);border:1px solid var(--border2);
    border-radius:10px;padding:12px 16px;font-family:var(--sans);font-size:14px;font-weight:500;
    color:var(--text);outline:none;margin-bottom:14px;transition:all .2s;display:block;-webkit-appearance:none}
  .title-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,135,.07)}
  .title-input::placeholder{color:var(--muted)}
  textarea{width:100%;min-height:260px;background:rgba(8,11,16,.9);border:1px solid var(--border2);
    border-radius:12px;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.7;
    color:var(--text);resize:vertical;outline:none;transition:all .2s;-webkit-appearance:none}
  textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,135,.07)}
  .textarea-wrap{position:relative}
  .char-counter{position:absolute;bottom:12px;right:14px;font-family:var(--mono);
    font-size:11px;color:var(--muted);pointer-events:none}
  .char-counter.warn{color:var(--amber)}

  /* Drop zone */
  .drop-zone{border:2px dashed var(--border2);border-radius:16px;padding:44px 24px;
    text-align:center;cursor:pointer;transition:all .25s;position:relative;
    background:rgba(8,11,16,.5)}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--green);
    background:rgba(0,255,135,.03);box-shadow:0 0 32px rgba(0,255,135,.06)}
  .drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .drop-icon{font-size:38px;margin-bottom:14px;display:block}
  .drop-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
  .drop-sub{font-size:13px;color:var(--muted);font-family:var(--mono)}
  .drop-types{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:16px}
  .type-tag{font-family:var(--mono);font-size:10px;padding:3px 9px;border-radius:6px;
    background:rgba(0,255,135,.06);border:1px solid rgba(0,255,135,.15);color:var(--muted2)}

  /* File queue */
  .file-queue{margin-top:18px;display:flex;flex-direction:column;gap:8px}
  .file-item{background:rgba(8,11,16,.8);border:1px solid var(--border2);border-radius:12px;
    padding:12px 16px;display:flex;align-items:center;gap:12px;animation:fadeUp .2s ease}
  .file-ext{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;
    text-transform:uppercase;flex-shrink:0}
  .file-info{flex:1;min-width:0}
  .file-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .file-size{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
  .file-status{font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;flex-shrink:0}
  .file-status.pending{color:var(--muted2);background:rgba(100,116,139,.12)}
  .file-status.uploading{color:var(--green);background:rgba(0,255,135,.1)}
  .file-status.done{color:#34d399;background:rgba(52,211,153,.1)}
  .file-status.error{color:var(--red);background:rgba(248,113,113,.1)}
  .file-remove{background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:16px;padding:4px;border-radius:4px;transition:color .2s;flex-shrink:0}
  .file-remove:hover{color:var(--red)}
  .progress-bar-wrap{height:2px;background:var(--border);border-radius:1px;
    margin-top:6px;overflow:hidden;display:none}
  .progress-bar-wrap.active{display:block}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));
    border-radius:1px;transition:width .3s ease;width:0%}

  /* Buttons */
  .submit-row{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;
    flex-wrap:wrap;align-items:center}
  .btn-secondary{padding:11px 22px;background:transparent;border:1px solid var(--border2);
    border-radius:10px;font-family:var(--sans);font-size:14px;font-weight:600;
    color:var(--muted2);cursor:pointer;transition:all .2s}
  .btn-secondary:hover{border-color:var(--text);color:var(--text)}
  .btn-primary{padding:11px 28px;background:linear-gradient(135deg,rgba(0,255,135,.12),rgba(168,85,247,.12));
    border:1px solid rgba(0,255,135,.25);border-radius:10px;font-family:var(--sans);font-size:14px;
    font-weight:700;color:var(--green);cursor:pointer;transition:all .2s;letter-spacing:.3px;position:relative}
  .btn-primary:hover{border-color:rgba(0,255,135,.5);
    box-shadow:0 0 20px rgba(0,255,135,.1),0 4px 16px rgba(0,0,0,.3);transform:translateY(-1px)}
  .btn-primary:active{transform:translateY(0)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .btn-primary .spinner,.spinner{display:inline-block;width:14px;height:14px;
    border:2px solid rgba(0,255,135,.2);border-top-color:var(--green);border-radius:50%;
    animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Toast */
  .toast-container{position:fixed;bottom:28px;right:28px;display:flex;
    flex-direction:column;gap:8px;z-index:1000;pointer-events:none}
  .toast{background:rgba(19,24,32,.95);backdrop-filter:blur(12px);border:1px solid var(--border2);
    border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:10px;font-size:14px;
    font-weight:600;min-width:240px;max-width:360px;animation:slideIn .3s ease;
    pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .toast.success{border-left:3px solid var(--green)}
  .toast.error{border-left:3px solid var(--red)}
  .toast.info{border-left:3px solid var(--blue)}
  .toast-icon{font-size:18px;flex-shrink:0}
  .toast-msg{flex:1}
  .toast-detail{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}
  @keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
  @keyframes slideOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(16px)}}

  /* Log */
  .log-panel{margin-top:28px;background:rgba(19,24,32,.75);backdrop-filter:blur(20px);
    border:1px solid var(--border2);border-radius:20px;overflow:hidden}
  .log-header{display:flex;align-items:center;justify-content:space-between;
    padding:14px 20px;border-bottom:1px solid var(--border2)}
  .log-header-title{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--muted2);
    text-transform:uppercase;letter-spacing:1.5px;display:flex;align-items:center;gap:8px}
  .log-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 6px var(--green);animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .log-clear{font-family:var(--mono);font-size:11px;color:var(--muted2);background:none;
    border:1px solid var(--border2);border-radius:6px;padding:4px 10px;cursor:pointer;transition:color .2s}
  .log-clear:hover{color:var(--text)}
  .log-body{padding:14px 20px;font-family:var(--mono);font-size:12px;max-height:200px;
    overflow-y:auto;display:flex;flex-direction:column;gap:5px}
  .log-entry{display:flex;gap:12px;align-items:flex-start;line-height:1.5}
  .log-time{color:var(--muted);flex-shrink:0}
  .log-entry.success .log-msg{color:var(--green)}
  .log-entry.error .log-msg{color:var(--red)}
  .log-entry.info .log-msg{color:var(--blue)}
  .log-entry.warn .log-msg{color:var(--amber)}
  .log-empty{color:var(--muted);font-size:12px;text-align:center;padding:20px}

  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

  @media(max-width:768px){
    .wrapper{padding:20px 14px 60px}
    header{margin-bottom:28px;gap:10px}
    .logo-name{font-size:18px}
    .header-right{gap:8px}
    .header-badge{display:none}
    .btn-explorer{padding:6px 12px;font-size:10px}
    .btn-logout{padding:6px 10px;font-size:10px}
    .tabs{padding:4px;gap:3px}
    .tab-btn{padding:9px 12px;font-size:13px}
    .card{padding:18px 16px}
    .drop-zone{padding:32px 16px}
    .submit-row{gap:8px}
    .toast-container{bottom:16px;right:12px;left:12px}
    .toast{min-width:unset;font-size:13px}
    .log-panel{margin-top:20px}
    .log-body{font-size:11px;max-height:160px}
  }
  @media(max-width:400px){
    .submit-row{flex-direction:column}
    .btn-primary,.btn-secondary{width:100%;justify-content:center}
    .tab-btn{font-size:12px;padding:8px}
  }
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo-icon">⬡</div>
    <div class="logo-text">Data<span>Vault</span></div>
    <div class="header-right">
      <div class="header-badge">v1.0 · UPLOAD CENTER</div>
      <a class="btn-explorer" href="viewer.html">🗂 Ver archivos →</a>
      <button class="btn-logout" onclick="logout()">⎋ Salir</button>
    </div>
  </header>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('text', this)">✏️ &nbsp;Texto</button>
    <button class="tab-btn" onclick="switchTab('file', this)">📁 &nbsp;Archivos</button>
  </div>

  <!-- TEXT PANEL -->
  <div class="panel active" id="panel-text">
    <div class="card">
      <div class="card-title">Enviar texto a DynamoDB</div>
      <input type="text" id="textTitle" placeholder="Título del texto..." class="title-input" />
      <div class="textarea-wrap">
        <textarea id="textContent" placeholder="Pega aquí tu texto, bloque de código, configuración, logs...&#10;&#10;Soporta hasta ~500,000 caracteres (bloques muy grandes)." oninput="updateCounter()"></textarea>
        <span class="char-counter" id="charCounter">0 chars</span>
      </div>
      <div class="submit-row">
        <button class="btn-secondary" onclick="clearText()">Limpiar</button>
        <button class="btn-primary" id="btnSendText" onclick="sendText()">
          Enviar a DynamoDB →
        </button>
      </div>
    </div>
  </div>

  <!-- FILE PANEL -->
  <div class="panel" id="panel-file">
    <div class="card">
      <div class="card-title">Subir archivos a S3</div>
      <input type="text" id="fileTitle" placeholder="Título del documento..." class="title-input" />
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept="*/*" onchange="handleFiles(this.files)" />
        <span class="drop-icon">📦</span>
        <div class="drop-title">Arrastra archivos o haz clic aquí</div>
        <div class="drop-sub">Cualquier tipo · Máx. 50 MB por archivo</div>
        <div class="drop-types">
          <span class="type-tag">.txt</span>
          <span class="type-tag">.pdf</span>
          <span class="type-tag">.py</span>
          <span class="type-tag">.java</span>
          <span class="type-tag">.json</span>
          <span class="type-tag">.csv</span>
          <span class="type-tag">.png / .jpg</span>
          <span class="type-tag">.zip</span>
          <span class="type-tag">+ más</span>
        </div>
      </div>

      <div class="file-queue" id="fileQueue"></div>

      <div class="submit-row">
        <button class="btn-secondary" onclick="clearFiles()">Limpiar cola</button>
        <button class="btn-primary" id="btnSendFiles" onclick="sendFiles()">
          Subir a S3 →
        </button>
      </div>
    </div>
  </div>

  <!-- Activity Log -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-header-title">
        <div class="log-dot"></div>
        Activity Log
      </div>
      <button class="log-clear" onclick="clearLog()">Limpiar</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty" id="logEmpty">Sin actividad reciente.</div>
    </div>
  </div>

</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>
<script>

// ── LOGOUT ───────────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('dv_access_token');
  localStorage.removeItem('dv_id_token');
  localStorage.removeItem('dv_refresh_token');
  localStorage.removeItem('dv_token_expires');
  window.location.replace('login.html');
}

// ─── CONFIG ─────────────────────────────────────────────────────────────────
const API_URL = 'https://jp6e2ypfmgt2fhsf4h7cnhsqma0lhekg.lambda-url.sa-east-1.on.aws';

// ─── STATE ───────────────────────────────────────────────────────────────────
let fileQueue = []; // { file, id, status }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2, 9);
}

function formatBytes(bytes) {
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1048576)    return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function now() {
  return new Date().toLocaleTimeString('es-PE', { hour12: false });
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ─── TEXT ────────────────────────────────────────────────────────────────────
function updateCounter() {
  const len = document.getElementById('textContent').value.length;
  const el = document.getElementById('charCounter');
  el.textContent = len.toLocaleString() + ' chars';
  el.classList.toggle('warn', len > 400000);
}

function clearText() {
  document.getElementById('textContent').value = '';
  document.getElementById('textTitle').value = '';
  updateCounter();
}

async function sendText() {
  const content = document.getElementById('textContent').value.trim();
  const title   = document.getElementById('textTitle').value.trim() || 'sin título';

  if (!content) { toast('warn', 'El campo de texto está vacío.'); return; }

  const btn = document.getElementById('btnSendText');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Enviando...';

  const payload = {
    id: uid(),
    title,
    content,
    charCount: content.length,
    createdAt: new Date().toISOString()
  };

  log('info', `Enviando texto "${title}" (${content.length.toLocaleString()} chars) → DynamoDB`);

  try {
    const res = await fetch(`${API_URL}/api/texts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || data.success === false) {
      throw new Error(data.message || `HTTP ${res.status}`);
    }

    log('success', `Texto "${payload.title}" guardado en DynamoDB ✓`);
    toast('success', 'Texto enviado correctamente', `Título: ${payload.title}`);
  } catch (err) {
    log('error', `Error al enviar texto: ${err.message}`);
    toast('error', 'Error al enviar texto', err.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Enviar a DynamoDB →';
  }
}

// ─── FILES ───────────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
  for (const file of files) {
    if (file.size > 52428800) { // 50MB
      toast('warn', `"${file.name}" supera 50MB`, 'Archivo omitido');
      continue;
    }
    const id = uid();
    fileQueue.push({ file, id, status: 'pending' });
    renderFileItem({ file, id, status: 'pending' });
  }
  // reset input so same file can be re-added
  document.getElementById('fileInput').value = '';
}

function getExtColor(ext) {
  const map = {
    pdf:  ['#ff6b6b','#fff0'],
    py:   ['#3b82f6','#e8f0ff'],
    java: ['#f59e0b','#fff8e1'],
    js:   ['#eab308','#fefce8'],
    ts:   ['#3b82f6','#eff6ff'],
    json: ['#10b981','#ecfdf5'],
    csv:  ['#22c55e','#f0fdf4'],
    txt:  ['#94a3b8','#f1f5f9'],
    zip:  ['#8b5cf6','#f5f3ff'],
    png:  ['#ec4899','#fdf2f8'],
    jpg:  ['#f97316','#fff7ed'],
    jpeg: ['#f97316','#fff7ed'],
    gif:  ['#a855f7','#faf5ff'],
    xml:  ['#06b6d4','#ecfeff'],
    sql:  ['#6366f1','#eef2ff'],
    sh:   ['#14b8a6','#f0fdfa'],
  };
  const lext = (ext || '').toLowerCase();
  return map[lext] || ['#6b7280', '#f9fafb'];
}

function renderFileItem({ file, id, status }) {
  const ext = file.name.split('.').pop() || '?';
  const [bgColor] = getExtColor(ext);
  const queue = document.getElementById('fileQueue');

  const item = document.createElement('div');
  item.className = 'file-item';
  item.id = 'fitem-' + id;
  item.innerHTML = `
    <div class="file-ext" style="background:${bgColor}22;color:${bgColor};border:1px solid ${bgColor}44;">
      ${ext.slice(0,4)}
    </div>
    <div class="file-info">
      <div class="file-name">${file.name}</div>
      <div class="file-size">${formatBytes(file.size)}</div>
      <div class="progress-bar-wrap" id="prog-${id}">
        <div class="progress-bar" id="progbar-${id}"></div>
      </div>
    </div>
    <span class="file-status pending" id="fstatus-${id}">En cola</span>
    <button class="file-remove" onclick="removeFile('${id}')" title="Quitar">✕</button>
  `;
  queue.appendChild(item);
}

function setFileStatus(id, status, label) {
  const el = document.getElementById('fstatus-' + id);
  if (!el) return;
  el.className = 'file-status ' + status;
  el.textContent = label;
}

function removeFile(id) {
  fileQueue = fileQueue.filter(f => f.id !== id);
  const el = document.getElementById('fitem-' + id);
  if (el) el.remove();
}

function clearFiles() {
  fileQueue = [];
  document.getElementById('fileQueue').innerHTML = '';
}

async function sendFiles() {
  const pending = fileQueue.filter(f => f.status === 'pending');
  if (!pending.length) { toast('warn', 'No hay archivos pendientes en la cola.'); return; }

  const btn = document.getElementById('btnSendFiles');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Subiendo...';

  let ok = 0, fail = 0;

  for (const item of pending) {
    item.status = 'uploading';
    setFileStatus(item.id, 'uploading', 'Subiendo...');

    const progWrap = document.getElementById('prog-' + item.id);
    const progBar  = document.getElementById('progbar-' + item.id);
    if (progWrap) progWrap.classList.add('active');

    log('info', `Subiendo: ${item.file.name} (${formatBytes(item.file.size)}) → S3`);

    try {
      const formData = new FormData();
      formData.append('file', item.file);
      const fileTitle = document.getElementById('fileTitle').value.trim() || item.file.name;
      formData.append('title', fileTitle);
      formData.append('originalName', item.file.name);
      formData.append('uploadedAt', new Date().toISOString());

      // Simulated progress (XHR for real progress)
      const result = await uploadWithProgress(
        `${API_URL}/api/files/upload`,
        formData,
        (pct) => { if (progBar) progBar.style.width = pct + '%'; }
      );

      item.status = 'done';
      setFileStatus(item.id, 'done', '✓ Subido');
      if (progBar) progBar.style.width = '100%';
      const uploadedTitle = result?.data?.title || fileTitle;
      log('success', `"${uploadedTitle}" subido correctamente ✓`);
      ok++;
    } catch (err) {
      item.status = 'error';
      setFileStatus(item.id, 'error', 'Error');
      log('error', `${item.file.name}: ${err.message}`);
      fail++;
    }
  }

  btn.disabled = false;
  btn.innerHTML = 'Subir a S3 →';

  if (ok > 0 && fail === 0) toast('success', `${ok} archivo(s) subidos a S3 correctamente`);
  else if (fail > 0) toast('error', `${fail} error(s), ${ok} éxitos`, 'Revisa el log para detalles');
}

function uploadWithProgress(url, formData, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100));
    });

    xhr.addEventListener('load', () => {
      try {
        const parsed = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300 && parsed.success !== false) {
          resolve(parsed);
        } else {
          reject(new Error(parsed.message || `HTTP ${xhr.status}`));
        }
      } catch {
        if (xhr.status >= 200 && xhr.status < 300) {
          resolve({});
        } else {
          reject(new Error(`HTTP ${xhr.status} — ${xhr.statusText}`));
        }
      }
    });

    xhr.addEventListener('error', () => reject(new Error('Network error')));
    xhr.addEventListener('abort', () => reject(new Error('Upload aborted')));

    xhr.open('POST', url, true);
    xhr.send(formData);
  });
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
const ICONS = { success: '✅', error: '❌', warn: '⚠️', info: 'ℹ️' };

function toast(type, msg, detail = '') {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + (type === 'warn' ? 'info' : type);
  t.innerHTML = `
    <span class="toast-icon">${ICONS[type] || 'ℹ️'}</span>
    <div class="toast-msg">
      ${msg}
      ${detail ? `<div class="toast-detail">${detail}</div>` : ''}
    </div>`;
  container.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'slideOut 0.3s ease forwards';
    setTimeout(() => t.remove(), 300);
  }, 4000);
}

// ─── LOG ─────────────────────────────────────────────────────────────────────
function log(type, msg) {
  const body  = document.getElementById('logBody');
  const empty = document.getElementById('logEmpty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  entry.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg">${msg}</span>`;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

function clearLog() {
  const body = document.getElementById('logBody');
  body.innerHTML = '<div class="log-empty" id="logEmpty">Sin actividad reciente.</div>';
}

// ─── INIT ────────────────────────────────────────────────────────────────────
log('info', 'DataVault iniciado. Conectado a AWS Lambda.');

</script>
